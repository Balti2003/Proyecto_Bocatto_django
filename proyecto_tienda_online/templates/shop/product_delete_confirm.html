{% extends "general/layout.html" %}
{% block page_content %}

{% block head_title %}Eliminar producto{% endblock %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">
                    <h2 class="fw-bold mb-4">¿Eliminar producto?</h2>
                    <p class="text-muted mb-4">
                        Estás a punto de eliminar <strong>{{ object.nombre }}</strong>. 
                        Esta acción no se puede deshacer.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill">Confirmar eliminación</button>
                            <a href="{% url 'product-manage' %}" class="btn btn-outline-secondary rounded-pill">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
